<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowback" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6b7280"/>
    </marker>
  </defs>

  <g fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5">
    <rect x="20"  y="70" width="160" height="110" rx="10"/>
    <rect x="230" y="70" width="160" height="110" rx="10"/>
    <rect x="440" y="70" width="160" height="110" rx="10"/>
    <rect x="650" y="70" width="160" height="110" rx="10"/>
    <rect x="860" y="70" width="120" height="110" rx="10"/>
  </g>

  <g text-anchor="middle" fill="#1f2328" font-size="15" font-weight="600">
    <text x="100" y="115">System maps</text>
    <text x="310" y="115">Taylor maps</text>
    <text x="520" y="115">FBI solve</text>
    <text x="730" y="115">Coefficients</text>
    <text x="920" y="115">Inference</text>
  </g>

  <g text-anchor="middle" fill="#57606a" font-size="12">
    <text x="100" y="138">fsys · hsys · fexo</text>
    <text x="310" y="138">degree d series</text>
    <text x="520" y="138">degrees 1 .. d</text>
    <text x="730" y="138">theta, lambda</text>
    <text x="920" y="138">pi(w), c(w)</text>
  </g>

  <g text-anchor="middle" fill="#8c959f" font-size="11" font-style="italic">
    <text x="100" y="160">user defined</text>
    <text x="310" y="160">taylor.py</text>
    <text x="520" y="160">fbi.py / fbi_fast.py</text>
    <text x="730" y="160">manifold + feedforward</text>
    <text x="920" y="160">fbi_eval.py</text>
  </g>

  <text x="520" y="200" text-anchor="middle" fill="#2563eb" font-size="11">dense kron  |  decoupled per degree</text>

  <g stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="182" y1="125" x2="226" y2="125"/>
    <line x1="392" y1="125" x2="436" y2="125"/>
    <line x1="602" y1="125" x2="646" y2="125"/>
    <line x1="812" y1="125" x2="856" y2="125"/>
  </g>

  <path d="M920,182 L920,255 L100,255 L100,182" stroke="#6b7280" stroke-width="1.8"
        stroke-dasharray="6 4" fill="none" marker-end="url(#arrowback)"/>
  <text x="510" y="248" text-anchor="middle" fill="#6b7280" font-size="12">
    re-solve at each operating point (about 10 ms, full drone)
  </text>
</svg>
